<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odom Smart Home Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: url('cemetery.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 15px; 
            font-family: 'Cinzel', serif;
        }
        .tab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 600px; 
        }
        .glass-tab {
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(244, 236, 216, 0.3);
            border-radius: 12px;
            height: 140px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #f4ecd8;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            padding: 10px;
        }
        .double-tab { grid-column: span 2; height: 100px; }
        .glass-tab i { font-size: 2rem; margin-bottom: 8px; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5)); }
        .glass-tab span { font-size: 0.8rem; font-weight: 600; text-align: center; letter-spacing: 1px; }
        
        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .glass-card-modal { background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 12px; border: 1px solid rgba(244, 236, 216, 0.3); text-align: center; width: 100%; }
        .button-grid-modal { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .modal-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(244, 236, 216, 0.3); padding: 20px; color: #f4ecd8; border-radius: 8px; cursor: pointer; font-family: 'Cinzel', serif; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #f4ecd8; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tab-grid">
        <button class="glass-tab double-tab">
            <i class="fa-solid fa-book-open-reader"></i>
            <span>AUDIO BOOKSHELF</span>
        </button>
        <button class="glass-tab">
            <i class="fa-solid fa-shield-halved"></i>
            <span>SECURITY & ACCESS</span>
        </button>
        <button onclick="document.getElementById('lights-modal').style.display='flex'" class="glass-tab">
            <i class="fa-solid fa-lightbulb"></i>
            <span>QUICK LIGHTS</span>
        </button>
        <button class="glass-tab">
            <i class="fa-solid fa-calendar-days"></i>
            <span>FAMILY CALENDAR</span>
        </button>
        <button class="glass-tab">
            <i class="fa-solid fa-brain"></i>
            <span>ZOE'S GEMINI</span>
        </button>
        <a href="https://my.smartthings.com/" class="glass-tab">
            <i class="fa-solid fa-thermostat"></i>
            <span>NEST THERMOSTAT</span>
        </a>
        <button onclick="document.getElementById('weather-modal').style.display='flex'" class="glass-tab">
            <i id="live-weather-icon" class="fa-solid fa-cloud-sun"></i>
            <span id="live-weather-temp">75°F METROPOLIS</span>
        </button>
    </div>

    <div id="lights-modal" class="modal-overlay">
        <div class="glass-card-modal">
            <button class="close-btn" onclick="document.getElementById('lights-modal').style.display='none'"><i class="fa-solid fa-xmark"></i></button>
            <h2>LIGHT GROUPS</h2>
            <div class="button-grid-modal">
                <button class="modal-btn">LIVING ROOM</button>
                <button class="modal-btn">KITCHEN</button>
                <button class="modal-btn">BEDROOM</button>
                <button class="modal-btn">EXTERIOR</button>
            </div>
        </div>
    </div>

    <div id="weather-modal" class="modal-overlay">
        <div class="glass-card-modal">
            <button class="close-btn" onclick="document.getElementById('weather-modal').style.display='none'"><i class="fa-solid fa-xmark"></i></button>
            <h2>7-DAY FUTURECAST</h2>
            <a class="weatherwidget-io" href="https://forecast7.com/en/37d15n88d73/metropolis/" data-label_1="METROPOLIS" data-font="Times New Roman" data-icons="Climacons Animated" data-theme="pure" data-units="us" data-basecolor="rgba(0,0,0,0)" data-textcolor="#f4ecd8" data-highcolor="#f4ecd8" data-lowcolor="#bfb7a4" data-cloudfill="#bfb7a4" data-days="7">METROPOLIS FORECAST</a>
        </div>
    </div>

    <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.15&longitude=-88.73&current_weather=true&temperature_unit=fahrenheit');
                const data = await res.json();
                document.getElementById('live-weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°F METROPOLIS`;
            } catch (e) { document.getElementById('live-weather-temp').innerText = 'OFFLINE'; }
        }
        fetchWeather();
    </script>
</body>
</html>
