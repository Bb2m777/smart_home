<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odom Smart Home Command</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Using a clean, elegant Serif font to match your original look -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        
        <!-- CARD 1: SECURITY & ACCESS -->
        <div class="glass-card">
            <div class="card-header">
                <i class="fa-solid fa-shield-halved main-icon"></i>
                <h2>SECURITY & ACCESS</h2>
                <p class="status-text">Perimeter Secure</p>
            </div>
            <div class="button-grid">
                <div class="dash-btn">
                    <i class="fa-solid fa-lightbulb"></i>
                    <span>QUICK LIGHTS</span>
                </div>
                <div class="dash-btn">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>FAMILY CALENDAR</span>
                </div>
                <div class="dash-btn">
                    <i class="fa-solid fa-brain"></i>
                    <span>ZOE'S GEMINI</span>
                </div>
                <!-- SmartThings Link (Forces a large popup window) -->
                <a href="https://my.smartthings.com/" onclick="window.open(this.href, 'SmartThings', 'width=1000,height=800'); return false;" class="dash-btn-link">
                    <i class="fa-solid fa-thermostat"></i>
                    <span>NEST THERMOSTAT</span>
                </a>
            </div>
        </div>

        <!-- CARD 2: AUDIO BOOKSHELF & WEATHER -->
        <div class="glass-card">
            <div class="card-header">
                <i class="fa-solid fa-book-open-reader main-icon"></i>
                <h2>AUDIO BOOKSHELF</h2>
                <p class="status-text">Library Active</p>
            </div>
            <div class="button-grid">
                <!-- Metropolis Weather Link (Forces a large popup window) -->
                <a href="https://weather.com/weather/tenday/l/Metropolis+IL+62960" onclick="window.open(this.href, 'Weather', 'width=1000,height=800'); return false;" class="dash-btn-link">
                    <i class="fa-solid fa-cloud-sun"></i>
                    <span>LOCAL WEATHER</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
