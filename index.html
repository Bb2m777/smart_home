<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odom Smart Home Command</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="tab-grid">
        <!-- AUDIO BOOKSHELF (Double-Width) -->
        <button class="glass-tab double-tab">
            <i class="fa-solid fa-book-open-reader"></i>
            <span>AUDIO BOOKSHELF</span>
        </button>
        <!-- SECURITY -->
        <button class="glass-tab">
            <i class="fa-solid fa-shield-halved"></i>
            <span>SECURITY & ACCESS</span>
        </button>
        <!-- QUICK LIGHTS -->
        <button class="glass-tab">
            <i class="fa-solid fa-lightbulb"></i>
            <span>QUICK LIGHTS</span>
        </button>
        <!-- FAMILY CALENDAR -->
        <button class="glass-tab">
            <i class="fa-solid fa-calendar-days"></i>
            <span>FAMILY CALENDAR</span>
        </button>
        <!-- ZOE'S GEMINI -->
        <button class="glass-tab">
            <i class="fa-solid fa-brain"></i>
            <span>ZOE'S GEMINI</span>
        </button>
        <!-- NEST THERMOSTAT -->
        <a href="https://my.smartthings.com/" class="glass-tab">
            <i class="fa-solid fa-thermostat"></i>
            <span>NEST THERMOSTAT</span>
        </a>
        <!-- LIVE WEATHER -->
        <button onclick="openWeatherModal()" class="glass-tab">
            <i id="live-weather-icon" class="fa-solid fa-cloud-sun"></i>
            <span id="live-weather-temp">75°F METROPOLIS</span>
        </button>
    </div>

    <!-- MODAL -->
    <div id="weather-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card-modal">
            <button class="close-btn" onclick="closeWeatherModal()"><i class="fa-solid fa-xmark"></i></button>
            <h2>7-DAY FUTURECAST</h2>
            <div class="weather-container">
                <a class="weatherwidget-io" href="https://forecast7.com/en/37d15n88d73/metropolis/" data-label_1="METROPOLIS" data-label_2="FORECAST" data-font="Times New Roman" data-icons="Climacons Animated" data-theme="pure" data-units="us" data-basecolor="rgba(0,0,0,0)" data-textcolor="#f4ecd8" data-highcolor="#f4ecd8" data-lowcolor="#bfb7a4" data-cloudfill="#bfb7a4" data-days="7">METROPOLIS FORECAST</a>
            </div>
        </div>
    </div>

    <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        function openWeatherModal() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeatherModal() { document.getElementById('weather-modal').style.display = 'none'; }
    </script>
</body>
</html>
